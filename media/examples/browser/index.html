<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>torch.js browser backprop example</title>
    <script src="../../build/torch.min.js" onerror="console.log('torch.js loading failed');"></script>
</head>

<body>
    <pre id="output"></pre>

    <script>
        const { Tensor } = window.torch;

        const x = new Tensor([2.0], { requires_grad: true });
        const y = x.pow(new Tensor([2.0]));

        const outEl = document.getElementById('output');
        const log = (...args) => {
            console.log(...args);
            outEl.textContent += args.map(String).join(' ') + "\n";
        };

        log(y.item());
        y.backward();
        log(x.grad && x.grad.item());
    </script>
</body>

</html>
